$schema: https://json-schema.org/draft/2020-12/schema
title: Architecture Repository Map
type: object
required:
  - project
  - repositories
  - services
  - datastores
  - queues
  - external_services
  - relationships
properties:
  project:
    type: object
    required:
      - id
      - name
      - description
      - owner_team
      - documentation_language
    properties:
      id:
        type: string
      name:
        type: string
      description:
        type: string
      owner_team:
        type: string
      documentation_language:
        type: string
  repositories:
    type: array
    minItems: 1
  services:
    type: array
    minItems: 1
  datastores:
    type: array
    minItems: 1
  queues:
    type: array
  external_services:
    type: array
  relationships:
    type: array
    minItems: 1
