$schema: https://json-schema.org/draft/2020-12/schema
title: Traceability Mapping
type: object
required:
  - feature
  - requirements
  - acceptance_criteria
  - tests
properties:
  feature:
    type: string
  requirements:
    type: array
    items:
      type: string
  acceptance_criteria:
    type: array
    items:
      type: string
  tests:
    type: array
    items:
      type: string
  contracts:
    type: array
    items:
      type: string
